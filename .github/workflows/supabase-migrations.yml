name: Supabase Migrations

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations.yml"
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate migration files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      - name: Validate migration filename format
        run: |
          invalid_files="$(find supabase/migrations -maxdepth 1 -type f -name '*.sql' ! -regex '.*/[0-9][0-9][0-9]_[a-z0-9_][a-z0-9_]*\.sql' -printf '%f\n')"
          if [ -n "$invalid_files" ]; then
            echo "Invalid migration filenames detected:"
            echo "$invalid_files"
            echo "Expected pattern: NNN_description.sql"
            exit 1
          fi

      - name: Start local Supabase stack
        run: supabase start

      - name: Check migration naming
        run: supabase migration list --local

      - name: Dry-run local reset
        run: supabase db reset --local --no-seed --debug --yes

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop

  deploy:
    name: Push remote migrations
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      - name: Verify required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            echo "Using SUPABASE_DB_URL for migration deployment."
            exit 0
          fi

          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Missing SUPABASE_ACCESS_TOKEN secret or provide SUPABASE_DB_URL instead."; exit 1; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "Missing SUPABASE_PROJECT_REF secret."; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "Missing SUPABASE_DB_PASSWORD secret."; exit 1; }

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL is set. Skipping project link."
          elif [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            supabase link \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --password "$SUPABASE_DB_PASSWORD" \
              --dns-resolver https
          else
            echo "Neither SUPABASE_DB_URL nor SUPABASE_ACCESS_TOKEN is set."
            exit 1
          fi

      - name: Push database migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            supabase db push --db-url "$SUPABASE_DB_URL" --dns-resolver https
          else
            supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --dns-resolver https
          fi
